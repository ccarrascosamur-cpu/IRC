backend:
  name: github
  repo: ccarrascosamur/IRC
  branch: main
  base_url: https://irc2.ccarrascosamur.workers.dev
  auth_endpoint: /auth

# Descomenta la siguiente línea para probar localmente sin deploy:
# local_backend: true

media_folder: "cms-site/img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "posiciones"
    label: "Posiciones"
    files:
      - label: "Tabla de Posiciones"
        name: "posiciones"
        file: "cms-site/data/posiciones.json"
        fields:
          - label: "Equipos"
            name: "posiciones"
            widget: "list"
            fields:
              - { label: "Posición", name: "Posicion", widget: "number", value_type: "int", min: 1 }
              - { label: "Equipo", name: "Equipo", widget: "string" }
              - { label: "PJ", name: "PJ", widget: "number", value_type: "int", min: 0 }
              - { label: "PG", name: "PG", widget: "number", value_type: "int", min: 0 }
              - { label: "PE", name: "PE", widget: "number", value_type: "int", min: 0 }
              - { label: "PP", name: "PP", widget: "number", value_type: "int", min: 0 }
              - { label: "PF", name: "PF", widget: "number", value_type: "int", min: 0 }
              - { label: "PC", name: "PC", widget: "number", value_type: "int", min: 0 }
              - { label: "Dif", name: "Dif", widget: "number", value_type: "int" }
              - { label: "Pts", name: "Pts", widget: "number", value_type: "int", min: 0 }

  - name: "fixture"
    label: "Fixture"
    files:
      - label: "Fixture Completo"
        name: "fixture"
        file: "cms-site/data/fixture.json"
        fields:
          - label: "Partidos"
            name: "fixture"
            widget: "list"
            fields:
              - { label: "Día semana", name: "DiaSemana", widget: "select", options: ["LUN", "MAR", "MIE", "JUE", "VIE", "SAB", "DOM"] }
              - { label: "Día número", name: "DiaNum", widget: "number", value_type: "int", min: 1, max: 31 }
              - { label: "Mes", name: "Mes", widget: "select", options: ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"] }
              - { label: "Año", name: "Ano", widget: "number", value_type: "int" }
              - { label: "Hora", name: "Hora", widget: "string", pattern: ["^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$", "Formato HH:MM"] }
              - { label: "Localidad", name: "Localidad", widget: "select", options: ["Local", "Visita"] }
              - { label: "Rival", name: "Rival", widget: "string" }
              - { label: "IRC Score", name: "IRC_Score", widget: "string", required: false }
              - { label: "Rival Score", name: "Rival_Score", widget: "string", required: false }
              - { label: "Estado", name: "Estado", widget: "select", options: ["jugado", "proximo"] }
              - { label: "Cancha", name: "Cancha", widget: "string" }
              - { label: "Dirección", name: "Direccion", widget: "string", required: false }
              - { label: "Destacado", name: "EsDestacado", widget: "boolean", default: false }

  - name: "noticias"
    label: "Noticias"
    files:
      - label: "Noticias"
        name: "noticias"
        file: "cms-site/data/noticias.json"
        fields:
          - label: "Artículos"
            name: "noticias"
            widget: "list"
            fields:
              - { label: "Fecha", name: "Fecha", widget: "string", pattern: ["^\\d{2}/\\d{2}/\\d{4}$", "Formato DD/MM/AAAA"] }
              - { label: "Título", name: "Titulo", widget: "string" }
              - { label: "Resumen", name: "Resumen", widget: "text" }
              - { label: "Imagen URL", name: "ImagenURL", widget: "string" }
              - { label: "Link", name: "Link", widget: "string", default: "#" }
              - { label: "Destacada", name: "Destacada", widget: "boolean", default: false }

  - name: "stats"
    label: "Estadísticas"
    files:
      - label: "Estadísticas del Equipo"
        name: "stats"
        file: "cms-site/data/stats.json"
        fields:
          - label: "Estadísticas"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Victorias", name: "Victorias", widget: "number", value_type: "int", min: 0 }
              - { label: "Derrotas", name: "Derrotas", widget: "number", value_type: "int", min: 0 }
              - { label: "Empates", name: "Empates", widget: "number", value_type: "int", min: 0 }

  - name: "config"
    label: "Configuración"
    files:
      - label: "Configuración General"
        name: "config"
        file: "cms-site/data/config.json"
        fields:
          - { label: "WhatsApp (solo números)", name: "whatsapp_num", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Dirección", name: "direccion", widget: "string" }
          - { label: "Días de entrenamiento", name: "entrenamiento_dias", widget: "string" }
          - { label: "Horario entrenamiento", name: "entrenamiento_horario", widget: "string" }
          - { label: "Nombre cancha", name: "cancha_nombre", widget: "string" }
          - { label: "URL Google Maps", name: "maps_url", widget: "string" }
          - { label: "Calendario: título", name: "cal_summary", widget: "string" }
          - { label: "Calendario: descripción", name: "cal_description", widget: "text" }
